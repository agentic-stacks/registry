name: hardware-supermicro
owner: agentic-stacks
version: 2026.0403.1
category: hardware
repository: https://github.com/agentic-stacks/hardware-supermicro
tag: v2026.0403.1
description: Teaches AI agents to manage Supermicro server hardware — BMC configuration,
  BIOS management, RAID setup, firmware updates, and hardware inventory. Covers X11/X12/X13
  platforms with Redfish BMC support. Includes an optional container-based toolkit
  (ipmitool, SUM, SMCIPMITool, storcli, Ansible Redfish) so operators can manage Supermicro
  servers from any OS.
target:
  software: Supermicro BMC / BIOS
  versions:
  - X11 (Xeon Scalable Gen 1/2)
  - X12 (Xeon Scalable Gen 3)
  - X13 (Xeon Scalable Gen 4/5)
skills:
- name: concepts
  description: Supermicro architecture, X11/X12/X13 platforms, BMC fundamentals, Redfish
    API
- name: tools
  description: Tool landscape — ipmitool, Redfish API, SUM, SMCIPMITool, storcli,
    IPMIView
- name: architecture
  description: Container-based vs bare-metal tooling approach, privileged vs remote
    modes
- name: container-setup
  description: Build and run the Supermicro tools container, verify tool availability
- name: initial-config
  description: First-time BMC setup — IP, credentials, NTP, DNS, baseline config export
- name: bios
  description: BIOS configuration — view, set, export/import via Redfish and SUM,
    workload profiles
- name: bmc
  description: BMC management — users, alerts, power control, certificates, SNMP,
    syslog, KVM
- name: raid
  description: RAID management — storcli (MegaRAID), HBA/IT mode, VROC, RAID level
    selection
- name: firmware
  description: Firmware updates — SUM, Redfish, manual flash, rollback, update order
- name: inventory
  description: Hardware inventory — Redfish, ipmitool, dmidecode, lspci, asset export
- name: ansible
  description: Ansible automation — community.general Redfish modules, playbooks for
    fleet ops
- name: diagnose-hardware
  description: Hardware failure diagnosis — power, LEDs, memory, CPU thermal, fans,
    PSU
- name: diagnose-connectivity
  description: BMC/network connectivity troubleshooting — unreachable BMC, NIC issues,
    VLAN
- name: diagnose-storage
  description: Storage troubleshooting — foreign drives, rebuild, degraded arrays,
    boot failures
- name: known-issues
  description: Version-specific bugs and workarounds for Supermicro BMC/BIOS firmware
- name: compatibility
  description: Compatibility matrices — X11/X12/X13, BMC firmware versions, tool support
- name: decision-guides
  description: Decision aids — ipmitool vs Redfish vs SUM, RAID levels, config approaches
depends_on: []
requires:
  tools:
  - docker
  - docker-compose
  - git
  - curl
  - jq
